<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KMBA菁英計畫 2026 — 智慧客服</title>
  <style>
    :root {
      --blue: #0066CC;
      --blue-dark: #004C99;
      --bg: #121A30;
      --card: #FFFFFF;
      --soft: #F4F6FA;
      --mint: #EAFDF8;
      --text: #1A1A1A;
      --muted: #5A6475;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: linear-gradient(145deg, var(--bg) 0%, var(--blue-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }
    .app {
      width: min(480px, 100%);
      height: min(760px, 92vh);
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      color: #fff;
      padding: 20px 22px 18px;
    }
    .header-top { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: #fff;
      border: 2px solid rgba(255,255,255,.85);
      display: grid; place-items: center;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: .88; margin-top: 4px; }
    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      font-size: 11px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      background: var(--soft);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 88%;
    }
    .msg-row.bot { align-self: flex-start; }
    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #E6EBF2;
      object-fit: contain;
      flex-shrink: 0;
      padding: 2px;
    }
    .msg {
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.65;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: normal;
      overflow-wrap: break-word;
    }
    .msg-row.bot .msg {
      flex: 1 1 auto;
      min-width: 0;
      max-width: 100%;
    }
    .msg.bot {
      background: var(--card);
      border: 1px solid #E6EBF2;
      border-bottom-left-radius: 4px;
    }
    .msg.user {
      align-self: flex-end;
      max-width: 88%;
      background: var(--blue);
      color: #fff;
      border-bottom-right-radius: 4px;
      text-align: left;
    }
    .msg.system {
      align-self: center;
      background: var(--mint);
      color: var(--blue-dark);
      font-size: 12px;
      max-width: 95%;
      text-align: center;
    }
    .typing {
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--card);
      border-radius: 16px;
      border: 1px solid #E6EBF2;
      display: none;
      gap: 4px;
    }
    .typing.show { display: flex; }
    .typing span {
      width: 7px; height: 7px;
      background: var(--blue);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
    .chips {
      padding: 0 14px 10px;
      background: var(--soft);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      border: 1px solid #D7E3F4;
      background: #fff;
      color: var(--blue-dark);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      transition: .15s;
    }
    .chip:hover { background: var(--mint); border-color: var(--blue); }
    .input-area {
      padding: 14px 16px 18px;
      background: #fff;
      border-top: 1px solid #EEF2F7;
      display: flex;
      gap: 10px;
    }
    .input-area input {
      flex: 1;
      border: 1px solid #D7E3F4;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .input-area input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,102,204,.12);
    }
    .input-area button {
      border: none;
      background: var(--blue);
      color: #fff;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .input-area button:disabled { opacity: .55; cursor: not-allowed; }
    .footer-note {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      padding-bottom: 10px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="logo"><img src="kmba-logo.png" alt="KMBA LOGO" /></div>
        <div>
          <h1>KMBA菁英計畫 智慧客服</h1>
          <p>KT&G 大韓菸草 · 活動顧問 × 任務導航</p>
        </div>
      </div>
      <span class="badge">繁體中文｜智能語意匹配 V1.1</span>
    </header>

    <div class="messages" id="messages">
      <div class="msg-row bot">
        <img class="msg-avatar" src="kmba-logo.png" alt="KMBA" />
        <div class="msg bot">您好，我是 KMBA菁英計畫官方智慧客服 👋

我可以協助您了解日常任務、拜訪任務、抽獎券、區域競賽與雙月抽獎 😊

請直接輸入問題，或點選下方快捷問題 👇</div>
      </div>
    </div>

    <div class="typing" id="typing"><span></span><span></span><span></span></div>
    <div class="chips" id="chips">
      <button type="button" class="chip" data-q="日常任務說明">日常任務說明</button>
      <button type="button" class="chip" data-q="抽獎規則">抽獎規則</button>
      <button type="button" class="chip" data-q="超商禮券說明">超商禮券說明</button>
      <button type="button" class="chip" data-q="拜訪任務說明">拜訪任務說明</button>
    </div>

    <form class="input-area" id="form">
      <input id="input" type="text" placeholder="輸入您的問題…" autocomplete="off" maxlength="500" />
      <button type="submit" id="send">送出</button>
    </form>
    <div class="footer-note">中文提問以繁體中文回覆 · 英文提問以 English 回覆 · 免伺服器靜態版</div>
  </div>

  <script src="kb-engine.js"></script>
  <script>
    const messagesEl = document.getElementById('messages');
    const typingEl = document.getElementById('typing');
    const chipsEl = document.getElementById('chips');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    const LOGO_SRC = 'kmba-logo.png';

    function addMsg(text, role) {
      if (role === 'system') {
        const div = document.createElement('div');
        div.className = 'msg system';
        div.textContent = text;
        messagesEl.appendChild(div);
      } else if (role === 'user') {
        const div = document.createElement('div');
        div.className = 'msg user';
        div.textContent = text;
        messagesEl.appendChild(div);
      } else {
        const row = document.createElement('div');
        row.className = 'msg-row bot';
        const avatar = document.createElement('img');
        avatar.className = 'msg-avatar';
        avatar.src = LOGO_SRC;
        avatar.alt = 'KMBA';
        row.appendChild(avatar);
        const div = document.createElement('div');
        div.className = 'msg bot';
        div.textContent = text;
        row.appendChild(div);
        messagesEl.appendChild(row);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setLoading(on) {
      typingEl.classList.toggle('show', on);
      sendBtn.disabled = on;
      input.disabled = on;
      if (on) messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function sendMessage(text) {
      const q = (text || '').trim();
      if (!q) return;
      addMsg(q, 'user');
      input.value = '';
      setLoading(true);
      setTimeout(function () {
        if (typeof KB !== 'undefined' && KB.answer) {
          const data = KB.answer(q);
          addMsg(data.reply || '暫時無法回覆，請稍後再試。', 'bot');
        } else {
          addMsg('系統載入中，請重新整理頁面後再試。', 'system');
        }
        setLoading(false);
        input.focus();
      }, 350);
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      sendMessage(input.value);
    });

    document.querySelectorAll('.chip').forEach(function (btn) {
      btn.addEventListener('click', function () {
        sendMessage(btn.getAttribute('data-q') || btn.textContent);
      });
    });
  </script>
</body>
</html>
