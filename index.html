<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KMBA菁英計畫 2026 — 智慧客服</title>
  <style>
    :root {
      --blue: #0066CC;
      --blue-dark: #004C99;
      --bg: #121A30;
      --card: #FFFFFF;
      --soft: #F4F6FA;
      --mint: #EAFDF8;
      --text: #1A1A1A;
      --muted: #5A6475;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: linear-gradient(145deg, var(--bg) 0%, var(--blue-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }
    .app {
      width: min(480px, 100%);
      height: min(760px, 92vh);
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      color: #fff;
      padding: 20px 22px 18px;
    }
    .header-top { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: rgba(255,255,255,.15);
      display: grid; place-items: center;
      font-weight: 700; font-size: 14px;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: .88; margin-top: 4px; }
    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      font-size: 11px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      background: var(--soft);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.65;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--card);
      border: 1px solid #E6EBF2;
      border-bottom-left-radius: 4px;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--blue);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: var(--mint);
      color: var(--blue-dark);
      font-size: 12px;
      max-width: 95%;
      text-align: center;
    }
    .typing {
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--card);
      border-radius: 16px;
      border: 1px solid #E6EBF2;
      display: none;
      gap: 4px;
    }
    .typing.show { display: flex; }
    .typing span {
      width: 7px; height: 7px;
      background: var(--blue);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
    .chips {
      padding: 0 14px 10px;
      background: var(--soft);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      border: 1px solid #D7E3F4;
      background: #fff;
      color: var(--blue-dark);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      transition: .15s;
    }
    .chip:hover { background: var(--mint); border-color: var(--blue); }
    .input-area {
      padding: 14px 16px 18px;
      background: #fff;
      border-top: 1px solid #EEF2F7;
      display: flex;
      gap: 10px;
    }
    .input-area input {
      flex: 1;
      border: 1px solid #D7E3F4;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .input-area input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,102,204,.12);
    }
    .input-area button {
      border: none;
      background: var(--blue);
      color: #fff;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .input-area button:disabled { opacity: .55; cursor: not-allowed; }
    .footer-note {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      padding-bottom: 10px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="logo">KMBA</div>
        <div>
          <h1>KMBA菁英計畫 智慧客服</h1>
          <p>KT&G 大韓菸草 · 活動顧問 × 任務導航</p>
        </div>
      </div>
      <span class="badge">繁體中文｜Knowledge Base V1.0</span>
    </header>

    <div class="messages" id="messages">
      <div class="msg bot">您好，我是 KMBA菁英計畫官方智慧客服 👋

我可以協助您了解日常任務、拜訪任務、抽獎券、區域競賽與雙月抽獎。

請直接輸入問題，或點選下方快捷問題。</div>
    </div>

    <div class="typing" id="typing"><span></span><span></span><span></span></div>
    <div class="chips" id="chips"></div>

    <form class="input-area" id="form">
      <input id="input" type="text" placeholder="輸入您的問題…" autocomplete="off" maxlength="500" />
      <button type="submit" id="send">送出</button>
    </form>
    <div class="footer-note">中文提問以繁體中文回覆 · 英文提問以 English 回覆</div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const typingEl = document.getElementById('typing');
    const chipsEl = document.getElementById('chips');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setLoading(on) {
      typingEl.classList.toggle('show', on);
      sendBtn.disabled = on;
      input.disabled = on;
      if (on) messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage(text) {
      const q = (text || '').trim();
      if (!q) return;
      addMsg(q, 'user');
      input.value = '';
      setLoading(true);
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: q }),
        });
        const data = await res.json();
        addMsg(data.reply || '暫時無法回覆，請稍後再試。', 'bot');
      } catch (e) {
        addMsg('連線失敗，請確認 AI 客服伺服器已啟動。', 'system');
      } finally {
        setLoading(false);
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage(input.value);
    });

    fetch('/api/suggestions')
      .then(r => r.json())
      .then(data => {
        (data.suggestions || []).forEach(s => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'chip';
          btn.textContent = s;
          btn.addEventListener('click', () => sendMessage(s));
          chipsEl.appendChild(btn);
        });
      })
      .catch(() => {});
  </script>
</body>
</html>
